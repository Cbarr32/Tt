<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Important Message for My Wife</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .message-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
        }
        .heart {
            font-size: 2em;
            margin: 20px 0;
        }
        .message {
            font-size: 2.5em;
            font-weight: bold;
            margin: 30px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        .from {
            font-style: italic;
            margin-top: 30px;
            opacity: 0.9;
        }
        .date {
            font-size: 0.9em;
            opacity: 0.7;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="message-container">
        <div class="heart">💌</div>
        <h1>For My Beloved Wife</h1>
        <div class="message">Ya wal lmd</div>
        <div class="heart">❤️</div>
        <div class="from">With all my love,<br>Your husband</div>
        <div class="date">Repository: Cbarr32/Tt</div>
    </div>
</body>
</html>
